<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ozzy - The Game</title>
    
    <!-- CSS Separado -->
    <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <!-- Camada de Interface do Usuário -->
    <div id="ui-layer">
        <div id="score-hud">MOEDAS: 0</div>
        <div id="level-hud">FASE: 1</div>
        <div id="lives-hud">VIDAS: 3</div>
    </div>

    <!-- Tela Inicial -->
    <div id="start-screen" class="screen">
        <h1>🎸 OZZY - THE GAME 🎸</h1>
        <p>Ajude o Ozzy a atravessar as fases!<br>Pule nas plataformas, colete moedas e chegue na bandeira.</p>
        <p>Cuidado com as <strong>Aranhas</strong> e <strong>Morcegos</strong>!</p>
        <button id="btn-start">JOGAR</button>
    </div>

    <!-- Tela Game Over -->
    <div id="game-over-screen" class="screen" style="display: none;">
        <h1 style="color: red;">GAME OVER</h1>
        <p>Ozzy foi pego!</p>
        <button id="btn-restart">TENTAR DE NOVO</button>
    </div>

    <!-- Tela Vitória -->
    <div id="win-screen" class="screen" style="display: none;">
        <h1 style="color: gold;">VOCÊ VENCEU!</h1>
        <p>Parabéns! Ozzy completou a aventura.</p>
        <p>Pontuação Final: <span id="final-score">0</span></p>
        <button id="btn-play-again">JOGAR NOVAMENTE</button>
    </div>

    <!-- Controles Mobile -->
    <div id="mobile-controls">
        <div class="d-pad">
            <div class="control-btn" id="btn-left">←</div>
            <div class="control-btn" id="btn-right">→</div>
        </div>
        <div class="control-btn btn-jump" id="btn-jump">↑</div>
    </div>
</div>

<!-- JavaScript Separado -->
<script src="src/js/game.js"></script>

</body>
</html>
