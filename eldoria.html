<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eldoria ARPG - V13 Mobile Restoration</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<style>
html,body{ margin:0; width:100%; height:100%; overflow:hidden; background:black; font-family:'Segoe UI', Arial, sans-serif; touch-action: none; }

#gameCanvas { position:fixed; inset:0; display:block; width:100vw!important; height:100vh!important; z-index: 1; }

#hud{
    position:fixed; top:15px; left:15px; width:290px;
    background:linear-gradient(135deg, rgba(5,15,35,.95), rgba(15,25,45,.9)); padding:18px; border-radius:18px;
    z-index:1000; color:white; border: 2px solid rgba(90,185,255,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 0 20px rgba(90,185,255,0.1);
}
.bar{ height:20px; background:#111; border-radius:30px; overflow:hidden; margin-bottom:12px; position: relative; border: 1px solid rgba(255,255,255,0.1); }
.fill{ height:100%; transition: width 0.3s ease-out; }
.hp{ background: linear-gradient(90deg, #ff3333, #cc0000); box-shadow: 0 0 10px rgba(255, 51, 51, 0.5); }
.sp{ background: linear-gradient(90deg, #4488ff, #2255cc); box-shadow: 0 0 10px rgba(68, 136, 255, 0.5); }
.xp{ background: linear-gradient(90deg, #44ff88, #22aa55); box-shadow: 0 0 10px rgba(68, 255, 136, 0.5); }

/* Barra de vida com efeito de batimento */
#hpBarContainer { position: relative; }

#minimapContainer {
    position: fixed; bottom: 25px; right: 25px;
    width: 150px; height: 150px;
    background: rgba(5, 15, 25, 0.9);
    border: 4px solid #5ab9ff; border-radius: 50%;
    overflow: hidden; z-index: 2000;
    box-shadow: 0 0 25px rgba(0,0,0,0.7), inset 0 0 20px rgba(90,185,255,0.2);
}
#minimapCanvas { display: block; width: 100%; height: 100%; }

/* --- CONTROLES MOBILE --- */
#mobileControls { position: fixed; inset: 0; pointer-events: none; z-index: 4000; }
.mobile-btn { 
    pointer-events: auto; position: absolute; 
    background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1)); 
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 50%; color: white; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(5px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.1s, background 0.2s;
}
.mobile-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }
#joystickArea { 
    position: absolute; bottom: 40px; left: 40px; 
    width: 140px; height: 140px; background: rgba(255,255,255,0.08); 
    border-radius: 50%; pointer-events: auto;
    border: 2px solid rgba(255,255,255,0.2);
}
#joystickStick {
    position: absolute; top: 45px; left: 45px; width: 50px; height: 50px;
    background: linear-gradient(135deg, rgba(255,255,255,0.5), rgba(255,255,255,0.3)); border-radius: 50%;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
#btnAtk { bottom: 60px; right: 180px; width: 90px; height: 90px; background: linear-gradient(135deg, rgba(211, 51, 51, 0.5), rgba(150, 30, 30, 0.5)); font-size: 18px; }
#btnSkill { bottom: 160px; right: 140px; width: 65px; height: 65px; background: linear-gradient(135deg, rgba(45, 127, 255, 0.5), rgba(30, 80, 180, 0.5)); }
#btnInv { bottom: 160px; right: 40px; width: 65px; height: 65px; background: linear-gradient(135deg, rgba(100, 100, 100, 0.5), rgba(60, 60, 60, 0.5)); }
#btnShop { bottom: 60px; right: 40px; width: 65px; height: 65px; background: linear-gradient(135deg, rgba(230, 126, 34, 0.5), rgba(180, 90, 20, 0.5)); }

#controls{
    position:fixed; top:18px; right:18px; background:linear-gradient(135deg, rgba(0,0,0,.8), rgba(20,20,40,.8));
    padding:16px; border-radius:14px; color:white; z-index:999; font-size:13px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#combatLog{
    position:fixed; left:50%; transform:translateX(-50%); bottom:18px;
    width:400px; height:100px; overflow:auto; background:linear-gradient(180deg, rgba(0,0,0,.75), rgba(10,10,30,.75));
    border:1px solid rgba(90,185,255,.3); border-radius:14px; padding:12px;
    color:#d8e7ff; font-size:13px; z-index:1200; pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#statusWindow, #shopWindow{
    display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    width:90%; max-width: 680px; height:80vh; overflow:auto; 
    background:linear-gradient(135deg, #0a1930, #152545);
    border:3px solid #5ab9ff; padding:25px; border-radius:20px; z-index:5000; color:white;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 0 40px rgba(90,185,255,0.1);
}
.item{ 
    background:linear-gradient(135deg, #17304e, #1f4060); 
    padding:14px; margin:10px 0; border-radius:12px; cursor:pointer; 
    display:flex; justify-content:space-between; align-items:center; 
    border: 1px solid rgba(90,185,255,0.2);
    transition: background 0.2s, transform 0.1s;
}
.item:hover{ background:linear-gradient(135deg, #24496f, #2f5a80); transform: translateX(5px); }

/* Grid layout para inventário */
.inventory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
    max-height: 400px;
    overflow-y: auto;
    padding: 10px;
}
.nameplate{ position:fixed; pointer-events:none; text-align:center; font-weight:bold; z-index:3000; text-shadow:0 0 6px black; }
.guild{ display:block; color:#6fd7ff; font-size:12px; text-shadow: 0 0 5px rgba(111, 215, 255, 0.5); }
.playerName{ display:block; color:#ffd66b; font-size:18px; text-shadow: 0 0 8px rgba(255, 214, 107, 0.5); }
.title{ display:block; font-size:11px; color:#fff; }
.sell-btn { 
    background: linear-gradient(135deg, #e67e22, #c96b1a); 
    border:none; color:white; padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:bold; 
    box-shadow: 0 2px 10px rgba(230, 126, 34, 0.4);
    transition: transform 0.1s, background 0.2s;
}
.sell-btn:hover { background: linear-gradient(135deg, #f08e33, #d97b2a); transform: scale(1.05); }
.sell-btn:active { transform: scale(0.95); }

/* Esconde controles desktop no mobile e vice-versa */
@media (max-width: 800px) { #controls { display: none; } }
@media (min-width: 801px) { #mobileControls { display: none; } }
</style>
</head>
<body>

<div id="hud">
    <h2 style="margin:0; text-shadow: 0 0 10px rgba(255, 214, 107, 0.5);">⚔️ Eldoria</h2>
    <div id="goldDisplay" style="color:gold; font-weight:bold; margin-bottom:5px; text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);">💰 Gold: 0</div>
    <div id="hpBarContainer">HP <div class="bar"><div id="hp" class="fill hp"></div></div></div>
    SP <div class="bar"><div id="sp" class="fill sp"></div></div>
    XP <div class="bar"><div id="xp" class="fill xp"></div></div>
</div>

<div id="mobileControls">
    <div id="joystickArea"><div id="joystickStick"></div></div>
    <div id="btnAtk" class="mobile-btn">ATK</div>
    <div id="btnSkill" class="mobile-btn">Z</div>
    <div id="btnInv" class="mobile-btn">V</div>
    <div id="btnShop" class="mobile-btn">E</div>
</div>

<div id="controls">
    WASD ou Setas mover | SPACE ou ↑ atacar<br>
    Z Fireball | E Loja (NPC)<br>
    V Personagem | F Fullscreen<br>
    <span style="color:yellow; font-weight:bold;">P Pausar Jogo</span>
</div>

<div id="minimapContainer">
    <canvas id="minimapCanvas" width="180" height="180"></canvas>
</div>

<div id="combatLog"></div>

<div id="statusWindow">
    <div style="display:flex; justify-content:space-between"><h2>Ficha do Herói</h2><button onclick="toggleV()" style="background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">X</button></div>
    <div id="statsPanel" style="background:rgba(255,255,255,0.1); padding:10px; border-radius:8px; margin-bottom:10px;"></div>
    <h3>Equipado</h3>
    <div id="equippedPanel"></div>
    <h3>Mochila</h3>
    <div id="inventoryPanel" class="inventory-grid"></div>
</div>

<div id="shopWindow">
    <div style="display:flex; justify-content:space-between"><h2>Ferreiro João</h2><button onclick="toggleShop()" style="background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">X</button></div>
    <p>Venda seus itens por <span style="color:gold">25 Gold</span> cada.</p>
    <div id="shopInventoryPanel" class="inventory-grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/* -------- ESTADO E MECÂNICAS ORIGINAIS RESTAURADAS -------- */
let player={ level:1, xp:0, next:50, gold:0, baseAtk:10, baseDef:3, atk:10, def:3, hp:100, maxHp:100, sp:100, maxSp:100 };
let inventory=[];
let monsters=[];
let droppedItems=[]; // Itens no chão
let keys={};
let floatTexts=[];
let fireballs=[];
let visuals=[];
let lastDir = new THREE.Vector3(0,0,1);
let equipped={ weapon:null, shield:null, cape:null, boots:null, ring1:null, ring2:null };
let isAttacking = false;
let lastSpawnTime = 0;
let bossSpawned = false;
let currentBiome = 0; // 0: Plains, 1: Forest, 2: Desert, 3: Snow, 4: Volcanic
let gamePaused = false; // Controle de pausa do jogo

const miniMapCanvas = document.getElementById('minimapCanvas');
const ctxM = miniMapCanvas.getContext('2d');

const lootTable=[
    { name:"Iron Sword", slot:"weapon", atk:7, desc:"Lâmina de aço temperado.", icon:"🗡️" },
    { name:"Knight Shield", slot:"shield", def:8, desc:"Proteção de cavalaria.", icon:"🛡️" },
    { name:"Shadow Cape", slot:"cape", def:5, sp:20, desc:"Feita de sombras puras.", icon:"🧥" },
    { name:"Travel Boots", slot:"boots", def:2, speed:0.08, desc:"Aumenta velocidade.", icon:"👢" },
    { name:"Ring of Power", slot:"ring", atk:5, desc:"Anel dourado brilhante.", icon:"💍" },
    { name:"Ring of Life", slot:"ring", hp:30, desc:"Anel com gema azul.", icon:"💎" },
    { name:"Health Potion", slot:"consumable", heal:50, desc:"Recupera 50 HP.", icon:"🧪", stackable:true }
];

// Adicionar durabilidade aos itens
function createItem(baseItem) {
    let item = JSON.parse(JSON.stringify(baseItem));
    item.durability = 100; // Durabilidade inicial
    item.maxDurability = 100;
    return item;
}

// Biomas com cores e características diferentes
const biomes = [
    { name: "Green Plains", groundColor: 0x3ea55e, skyColor: 0x87ceeb, fogColor: 0x87ceeb, level: 1 },
    { name: "Dark Forest", groundColor: 0x2d5a2d, skyColor: 0x4a6b4a, fogColor: 0x3d5a3d, level: 5 },
    { name: "Golden Desert", groundColor: 0xd4c96e, skyColor: 0xffd7a0, fogColor: 0xe8c890, level: 10 },
    { name: "Frozen Snow", groundColor: 0xe8f4f8, skyColor: 0xb0d4e8, fogColor: 0xc8e0e8, level: 15 },
    { name: "Volcanic Lands", groundColor: 0x4a2a2a, skyColor: 0xff6b35, fogColor: 0x8b4513, level: 20 }
];

function log(m){ combatLog.innerHTML = `<div>${m}</div>` + combatLog.innerHTML; }

/* -------- ENGINE 3D -------- */
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);
const camera=new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.domElement.id = "gameCanvas";
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, .7));
let sun=new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(20,30,20);
scene.add(sun);

// Adicionar névoa para atmosfera
scene.fog = new THREE.Fog(biomes[0].fogColor, 50, 150);

let ground=new THREE.Mesh(new THREE.PlaneGeometry(2000,2000), new THREE.MeshStandardMaterial({color:biomes[0].groundColor}));
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// Função para mudar bioma baseado no nível
function updateBiome() {
    let newBiomeIndex = 0;
    for(let i = biomes.length - 1; i >= 0; i--) {
        if(player.level >= biomes[i].level) {
            newBiomeIndex = i;
            break;
        }
    }
    
    if(newBiomeIndex !== currentBiome) {
        currentBiome = newBiomeIndex;
        let biome = biomes[currentBiome];
        
        // Mudar cor do chão
        ground.material.color.setHex(biome.groundColor);
        
        // Mudar céu e névoa
        scene.background.setHex(biome.skyColor);
        scene.fog.color.setHex(biome.fogColor);
        scene.fog.near = 30;
        scene.fog.far = 120;
        
        floatingText("🌍 " + biome.name, hero.position, "white");
        log("<span style='color:cyan'>Entrou em: " + biome.name + "</span>");
        
        // Atualizar decorações do bioma
        addBiomeDecorations();
    }
}

/* -------- PERSONAGEM E VISUAIS -------- */
let hero=new THREE.Group();
let heroBody=new THREE.Mesh(new THREE.BoxGeometry(1,1.8,.8), new THREE.MeshStandardMaterial({color:0x3f7cff}));
heroBody.position.y=1; hero.add(heroBody);
let hair=new THREE.Mesh(new THREE.BoxGeometry(.9,.2,.8), new THREE.MeshStandardMaterial({color:0x2d160d}));
hair.position.y=1.95; hero.add(hair);
let hand=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.3), new THREE.MeshStandardMaterial({color:0xffdbac}));
hand.position.set(0.6,1,0.4); hand.visible=true;
hero.add(hand);
scene.add(hero);

let heroLabel=document.createElement("div");
heroLabel.className="nameplate";
heroLabel.innerHTML=`<span class='guild'>[Legends of Eldoria]</span><span class='playerName'>John Legend Lv.1</span><span class='title'>Dragon Slayer</span>`;
document.body.appendChild(heroLabel);

// Grupo para armas animadas
let weaponGroup = null;

function applyEquipVisual(){
    visuals.forEach(v=>hero.remove(v));
    visuals=[];
    weaponGroup = null; // Reset weapon group reference
    
    if(equipped.weapon){
        let w = new THREE.Group();
        let blade=new THREE.Mesh(new THREE.BoxGeometry(.15,1.6,.15), new THREE.MeshStandardMaterial({color:0xf0f0f0}));
        blade.position.y = 0.8; w.add(blade);
        let hilt=new THREE.Mesh(new THREE.BoxGeometry(.15,0.3,.15), new THREE.MeshStandardMaterial({color:0x8b4513}));
        hilt.position.y = 0.15; w.add(hilt);
        w.position.set(0.8, 1, 0.3); 
        w.rotation.x = Math.PI / 4; // Angulo inicial da espada
        hero.add(w); 
        visuals.push(w);
        weaponGroup = w; // Referência para animação
        hand.visible = false; // Esconde a mão quando tem arma
    } else {
        hand.visible = true; // Mostra a mão quando não tem arma
    }
    if(equipped.shield){
        let s=new THREE.Mesh(new THREE.BoxGeometry(.9,1,.2), new THREE.MeshStandardMaterial({color:0x777}));
        s.position.set(-0.9,1,0.2); hero.add(s); visuals.push(s);
    }
    if(equipped.cape){
        let c=new THREE.Mesh(new THREE.BoxGeometry(1,1.7,.08), new THREE.MeshStandardMaterial({color:0x331144}));
        c.position.set(0,0.85,-.45); hero.add(c); visuals.push(c);
    }
    if(equipped.boots){
        let b1=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.3,0.5), new THREE.MeshStandardMaterial({color:0x331100}));
        let b2=b1.clone(); b1.position.set(-0.3, 0.15, 0.1); b2.position.set(0.3, 0.15, 0.1);
        hero.add(b1); hero.add(b2); visuals.push(b1,b2);
    }
    if(equipped.ring1){
        let r1=new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({color:0xffd700, emissive:0xffaa00}));
        r1.position.set(0.6, 1.2, 0.4); hero.add(r1); visuals.push(r1);
    }
    if(equipped.ring2){
        let r2=new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({color:0x00d7ff, emissive:0x0055ff}));
        r2.position.set(-0.6, 1.2, 0.4); hero.add(r2); visuals.push(r2);
    }
}

function hpBar(){
    let el=document.createElement("div");
    el.style.cssText="position:fixed; width:50px; height:6px; background:#440000; pointer-events:none; border:1px solid black; z-index:3000;";
    let fill=document.createElement("div");
    fill.style.cssText="height:100%; background:#ff0000; width:100%;";
    el.appendChild(fill); document.body.appendChild(el);
    return {bar:el, fill};
}

function makeLabel(t){
    let d=document.createElement("div");
    d.className="nameplate"; d.style.fontSize="12px"; d.style.color="white";
    document.body.appendChild(d); d.innerHTML=t; return d;
}

function spawnMonster(elite=false){
    let sX = hero.position.x + (Math.random()-0.5)*150;
    let sZ = hero.position.z + (Math.random()-0.5)*150;
    
    // Boss só aparece via checkLevel, não aleatoriamente
    elite = elite || false;
    
    let lv = elite ? player.level * 2 : player.level + Math.floor(Math.random()*3);
    let size = elite ? 4 : 1.5;
    
    // Criar modelo de inimigo mais detalhado
    let monsterGroup = new THREE.Group();
    
    // Corpo principal - cor baseada no bioma
    let bodyColor = elite ? 0x8b0000 : (currentBiome === 3 ? 0x6688aa : (currentBiome === 4 ? 0xaa4433 : 0x6a3399));
    let bodyMat = new THREE.MeshStandardMaterial({color: bodyColor});
    let body = new THREE.Mesh(new THREE.BoxGeometry(size, size*0.6, size*0.7), bodyMat);
    body.position.y = size * 0.5;
    monsterGroup.add(body);
    
    // Cabeça
    let head = new THREE.Mesh(new THREE.BoxGeometry(size*0.7, size*0.5, size*0.6), bodyMat);
    head.position.y = size * 1.05;
    monsterGroup.add(head);
    
    // Olhos brilhantes
    let eyeMat = new THREE.MeshStandardMaterial({color: elite ? 0xff0000 : 0xffff00, emissive: elite ? 0xff0000 : 0xffff00, emissiveIntensity: 0.8});
    let eye1 = new THREE.Mesh(new THREE.SphereGeometry(size*0.12), eyeMat);
    eye1.position.set(-size*0.15, size*1.1, size*0.35);
    monsterGroup.add(eye1);
    let eye2 = eye1.clone();
    eye2.position.set(size*0.15, size*1.1, size*0.35);
    monsterGroup.add(eye2);
    
    // Chifres/orelhas para elite
    if(elite){
        let hornMat = new THREE.MeshStandardMaterial({color: 0x333333});
        let horn1 = new THREE.Mesh(new THREE.ConeGeometry(size*0.1, size*0.4, 8), hornMat);
        horn1.position.set(-size*0.25, size*1.4, 0);
        horn1.rotation.z = -0.3;
        monsterGroup.add(horn1);
        let horn2 = horn1.clone();
        horn2.position.set(size*0.25, size*1.4, 0);
        horn2.rotation.z = 0.3;
        monsterGroup.add(horn2);
    }
    
    // Braços
    let armMat = new THREE.MeshStandardMaterial({color: bodyColor});
    let arm1 = new THREE.Mesh(new THREE.BoxGeometry(size*0.25, size*0.5, size*0.25), armMat);
    arm1.position.set(-size*0.6, size*0.7, 0);
    monsterGroup.add(arm1);
    let arm2 = arm1.clone();
    arm2.position.set(size*0.6, size*0.7, 0);
    monsterGroup.add(arm2);
    
    monsterGroup.position.set(sX, 0, sZ);
    let hp = elite ? 1200 + (player.level * 100) : 50 + (lv * 10);
    let name = elite ? "BOSS Demon" : (currentBiome === 3 ? "Ice Wolf" : (currentBiome === 4 ? "Fire Imp" : "Wolf"));
    monsterGroup.userData={ name: name, level: lv, hp, maxHp: hp, xp: elite?500+(player.level*50):20+(lv*5), atk: elite?25+(player.level*3):5+(lv*2), isBoss: elite, lastAttack: 0, ui: hpBar(), label: makeLabel(""), mesh: monsterGroup, breatheOffset: Math.random() * Math.PI * 2 };
    scene.add(monsterGroup); monsters.push(monsterGroup);
    
    if(elite) {
        floatingText("⚠️ BOSS SPAWNED!", hero.position, "red");
        log("<span style='color:red; font-weight:bold;'>👹 UM BOSS APARECEU!</span>");
    }
}

function killMonster(m){
    player.xp += m.userData.xp;
    floatingText("+"+m.userData.xp+" XP", m.position, "lime");
    
    // Drop de itens no chão (randomico)
    let dropCount = m.userData.isBoss ? 5 : Math.floor(Math.random() * 3); // Boss dropa mais itens
    for(let i = 0; i < dropCount; i++) {
        if(Math.random() > 0.4) { // 60% chance de dropar cada item
            let randomItem = lootTable[Math.floor(Math.random() * lootTable.length)];
            let itemCopy = createItem(randomItem); // Usa funcao para criar item com durabilidade
            
            // Adicionar quantidade se for stackable (poção)
            if(itemCopy.stackable) {
                itemCopy.quantity = Math.floor(Math.random() * 3) + 1; // 1-3 poções
            }
            
            // Criar item visual no chão
            let itemMesh = new THREE.Group();
            
            // Base do item (brilho)
            let glowMat = new THREE.MeshStandardMaterial({color: 0xffd700, emissive: 0xffaa00, emissiveIntensity: 0.8});
            let glow = new THREE.Mesh(new THREE.RingGeometry(0.3, 0.4, 16), glowMat);
            glow.rotation.x = -Math.PI / 2;
            glow.position.y = 0.05;
            itemMesh.add(glow);
            
            // Ícone do item (cubo colorido baseado no slot)
            let itemColor = 0xffffff;
            if(itemCopy.slot === "weapon") itemColor = 0xff4444;
            else if(itemCopy.slot === "shield") itemColor = 0x4444ff;
            else if(itemCopy.slot === "cape") itemColor = 0x44ff44;
            else if(itemCopy.slot === "boots") itemColor = 0xffaa00;
            else if(itemCopy.slot === "ring") itemColor = 0xffd700;
            else if(itemCopy.slot === "consumable") itemColor = 0x00ff88; // Verde para poções
            
            let itemGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            let itemMat = new THREE.MeshStandardMaterial({color: itemColor, emissive: itemColor, emissiveIntensity: 0.5});
            let itemCube = new THREE.Mesh(itemGeo, itemMat);
            itemCube.position.y = 0.3;
            itemMesh.add(itemCube);
            
            itemMesh.position.copy(m.position);
            itemMesh.position.x += (Math.random() - 0.5) * 2;
            itemMesh.position.z += (Math.random() - 0.5) * 2;
            
            scene.add(itemMesh);
            droppedItems.push({
                mesh: itemMesh,
                item: itemCopy,
                life: 600 // 10 segundos a 60fps
            });
        }
    }
    
    // Efeito de partículas na morte
    createDeathParticles(m.position, m.userData.isBoss ? 0x8b0000 : 0x6a3399, m.userData.isBoss ? 30 : 15);
    
    scene.remove(m); m.userData.ui.bar.remove(); m.userData.label.remove();
    monsters.splice(monsters.indexOf(m),1);
    checkLevel();
}

function createDeathParticles(pos, color, count){
    for(let i=0; i<count; i++){
        let particle = new THREE.Mesh(
            new THREE.BoxGeometry(0.2, 0.2, 0.2),
            new THREE.MeshStandardMaterial({color: color, emissive: color, emissiveIntensity: 0.5})
        );
        particle.position.copy(pos);
        particle.position.x += (Math.random()-0.5) * 2;
        particle.position.y += Math.random() * 2;
        particle.position.z += (Math.random()-0.5) * 2;
        particle.userData = {
            velocity: new THREE.Vector3(
                (Math.random()-0.5) * 0.3,
                Math.random() * 0.3 + 0.2,
                (Math.random()-0.5) * 0.3
            ),
            life: 60
        };
        scene.add(particle);
        visuals.push(particle);
    }
}

function checkLevel(){
    if(player.xp >= player.next){
        player.level++; player.xp=0; player.next *= 1.5;
        let bonus = "";
        let r = Math.random();
        if(r < 0.25) { player.baseAtk += 5; bonus = "+5 ATK"; }
        else if(r < 0.5) { player.baseDef += 4; bonus = "+4 DEF"; }
        else if(r < 0.75) { player.maxHp += 40; bonus = "+40 HP"; }
        else { player.maxSp += 30; bonus = "+30 SP"; }
        player.hp = player.maxHp; player.sp = player.maxSp;
        heroLabel.querySelector(".playerName").innerHTML="John Legend Lv."+player.level;
        floatingText("LEVEL UP! " + bonus, hero.position, "gold");
        
        // Boss aparece a cada 5 níveis (level 5, 10, 15, 20...)
        if(player.level >= 5 && player.level % 5 === 0) {
            spawnMonster(true); // Spawn boss
        }
        
        recalcStats();
    }
}

function castFireball(){
    if(player.sp < 25){ log("SP insuficiente!"); return; }
    player.sp -= 25;
    let fb = new THREE.Mesh(new THREE.SphereGeometry(0.6), new THREE.MeshStandardMaterial({color:0xff4400, emissive:0xff0000}));
    fb.position.copy(hero.position).y = 1.2;
    scene.add(fb);
    fireballs.push({ mesh: fb, dir: lastDir.clone().normalize(), life: 80 });
}

function attack(){
    if(isAttacking || gamePaused) return;
    isAttacking = true;
    
    let t = 0;
    let animSpeed = 0.25;
    
    // Animação da espada ou da mão
    function animateAttack() {
        t += animSpeed;
        
        if (weaponGroup) {
            // Animação da espada: rotação para frente e volta
            weaponGroup.rotation.x = Math.PI / 4 - Math.sin(t) * 1.8;
            weaponGroup.rotation.z = Math.sin(t) * 0.5;
        } else {
            // Animação da mão quando não tem arma
            hand.position.z = 0.4 + Math.sin(t) * 0.8;
        }
        
        // Detecta hit no meio da animação (quando t ~ PI/2)
        if (t >= Math.PI / 2 && t < Math.PI / 2 + animSpeed) {
            monsters.forEach(m => {
                if(hero.position.distanceTo(m.position) < 4.5){
                    let dmg = player.atk + Math.floor(Math.random()*5);
                    m.userData.hp -= dmg; 
                    floatingText("-"+dmg, m.position, "orange");
                    
                    // Reduz durabilidade do equipamento ao atacar
                    if(equipped.weapon) {
                        equipped.weapon.durability -= 1;
                        if(equipped.weapon.durability <= 0) {
                            floatingText("💔 Arma Quebrou!", hero.position, "red");
                            log("<span style='color:red'>Sua arma quebrou!</span>");
                            equipped.weapon = null;
                            applyEquipVisual();
                        }
                        updatePanels();
                    }
                    
                    if(m.userData.hp <= 0) killMonster(m);
                }
            });
        }
        
        if(t >= Math.PI){ 
            if (weaponGroup) {
                weaponGroup.rotation.x = Math.PI / 4;
                weaponGroup.rotation.z = 0;
            } else {
                hand.position.z = 0.4;
            }
            isAttacking = false;
        } else {
            requestAnimationFrame(animateAttack);
        }
    }
    
    animateAttack();
}

/* -------- JOYSTICK LOGIC -------- */
let joyStickVector = { x: 0, y: 0 };
let isJoyactive = false;
const joyArea = document.getElementById('joystickArea');
const joyStick = document.getElementById('joystickStick');

function handleJoy(e) {
    if (!isJoyactive) return;
    const touch = e.touches ? e.touches[0] : e;
    const rect = joyArea.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = touch.clientX - cx;
    const dy = touch.clientY - cy;
    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 45);
    const angle = Math.atan2(dy, dx);
    
    joyStickVector.x = Math.cos(angle) * (dist/45);
    joyStickVector.y = Math.sin(angle) * (dist/45);
    
    joyStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
}

joyArea.addEventListener('touchstart', e => { isJoyactive = true; handleJoy(e); });
window.addEventListener('touchmove', e => { if(isJoyactive) { handleJoy(e); e.preventDefault(); } }, {passive: false});
window.addEventListener('touchend', () => { 
    isJoyactive = false; 
    joyStickVector = { x: 0, y: 0 }; 
    joyStick.style.transform = `translate(0,0)`;
});

function recalcStats(){
    let bAtk=0, bDef=0, bHp=0, bSp=0;
    for(let k in equipped) if(equipped[k]){
        bAtk += (equipped[k].atk || 0); bDef += (equipped[k].def || 0);
        bHp += (equipped[k].hp || 0); bSp += (equipped[k].sp || 0);
    }
    player.atk = player.baseAtk + bAtk; player.def = player.baseDef + bDef;
}

function updatePanels(){
    statsPanel.innerHTML=`<div style="font-size:18px; margin-bottom:10px;">🎯 Nível ${player.level}</div><div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;"><div style="background:rgba(255,100,100,0.3); padding:8px; border-radius:6px;">⚔️ ATK: ${player.atk}</div><div style="background:rgba(100,150,255,0.3); padding:8px; border-radius:6px;">🛡️ DEF: ${player.def}</div><div style="background:rgba(100,255,150,0.3); padding:8px; border-radius:6px;">❤️ HP: ${player.hp}/${player.maxHp+(equipped.ring1?.hp||0)+(equipped.ring2?.hp||0)}</div><div style="background:rgba(100,150,255,0.3); padding:8px; border-radius:6px;">💙 SP: ${Math.floor(player.sp)}/${player.maxSp+(equipped.cape?.sp||0)}</div></div><div style="margin-top:10px; color:gold;">💰 Gold: ${player.gold}</div>`;
    equippedPanel.innerHTML="";
    for(let k in equipped) {
        let item = equipped[k];
        let icon = item?.icon || '❓';
        let durabInfo = item ? `<small style="color:${item.durability < 30 ? 'red' : '#aaa'}"> (${item.durability}%)</small>` : '';
        equippedPanel.innerHTML+=`<div class='item' onclick="unequip('${k}')" style="min-height:40px;">${icon} ${k.toUpperCase()}: ${item?item.name:'Vazio'}${durabInfo}</div>`;
    }
    inventoryPanel.innerHTML="";
    inventory.forEach((it,i)=> {
        let icon = it.icon || '📦';
        let isEquipped = false;
        // Verifica se o item está equipado
        for(let k in equipped) {
            if(equipped[k] === it) {
                isEquipped = true;
                break;
            }
        }
        let equipInfo = isEquipped ? '<span style="color:gold; font-size:11px;"> [EQUIPADO]</span>' : '';
        let durabInfo = `<small style="color:${it.durability < 30 ? 'red' : '#aaa'}"> (${it.durability}/${it.maxDurability})</small>`;
        inventoryPanel.innerHTML+=`<div class='item' onclick='equip(${i})' style="min-height:45px; opacity:${isEquipped ? 0.7 : 1};">${icon} <div><b>${it.name}</b>${equipInfo}<br><small style="color:#aaa;\">[${it.slot}] ${it.desc||''} ${durabInfo}</small></div></div>`;
    });
    shopInventoryPanel.innerHTML="";
    inventory.forEach((it,i)=> {
        let icon = it.icon || '📦';
        // Verifica se o item está equipado
        let isEquipped = false;
        for(let k in equipped) {
            if(equipped[k] === it) {
                isEquipped = true;
                break;
            }
        }
        let sellBtn = isEquipped ? '<span style="color:#888; font-size:11px;">[Equipado]</span>' : `<button class='sell-btn' onclick='sellItem(${i})'>Vender (25G)</button>`;
        shopInventoryPanel.innerHTML+=`<div class='item' style="min-height:45px; opacity:${isEquipped ? 0.5 : 1};"><span>${icon} ${it.name}</span>${sellBtn}</div>`;

function sellItem(i){ 
    // Não permite vender item equipado
    let it = inventory[i];
    for(let k in equipped) {
        if(equipped[k] === it) {
            log("<span style='color:red'>Não é possível vender equipamento em uso!</span>");
            return;
        }
    }
    player.gold += 25; 
    inventory.splice(i,1);

}
function equip(i){
    let it=inventory[i]; let s = it.slot;
    if(s === "ring") s = !equipped.ring1 ? "ring1" : "ring2";
    equipped[s]=it; recalcStats(); applyEquipVisual(); updatePanels();
}
function unequip(k){ equipped[k]=null; recalcStats(); applyEquipVisual(); updatePanels(); }
function toggleV(){ statusWindow.style.display = statusWindow.style.display==="block"?"none":"block"; updatePanels(); }
function toggleShop(){ shopWindow.style.display = shopWindow.style.display==="block"?"none":"block"; updatePanels(); }

// Função para usar poção manualmente (tecla Q)
function usePotion() {
    if(gamePaused) return;
    let potionIndex = inventory.findIndex(it => it.slot === "consumable" && it.quantity > 0);
    if(potionIndex >= 0) {
        let potion = inventory[potionIndex];
        let maxHpTotal = player.maxHp + (equipped.ring1?.hp||0) + (equipped.ring2?.hp||0);
        if(player.hp >= maxHpTotal) {
            log("<span style='color:orange'>HP já está cheio!</span>");
            return;
        }
        player.hp = Math.min(maxHpTotal, player.hp + potion.heal);
        potion.quantity--;
        floatingText("🧪 +" + potion.heal + " HP", hero.position, "lime");
        log("<span style='color:cyan'>Poção usada! +" + potion.heal + " HP</span>");
        if(potion.quantity <= 0) {
            inventory.splice(potionIndex, 1);
        }
        updatePanels();
    } else {
        log("<span style='color:red'>Sem poções no inventário!</span>");
    }
}

function floatingText(txt,pos,color){
    let d=document.createElement("div"); d.style.position="fixed"; d.style.color=color; d.style.fontWeight="bold"; d.style.zIndex="6000";
    document.body.appendChild(d); floatTexts.push({div:d, pos:pos.clone(), life:60, txt});
}

/* -------- LOOP DE JOGO -------- */
function animate(time){
    requestAnimationFrame(animate);

    // Se jogo estiver pausado, não atualiza lógica do jogo
    if(gamePaused) {
        // Ainda renderiza a cena
        camera.position.set(hero.position.x, 14, hero.position.z+14);
        camera.lookAt(hero.position);
        renderer.render(scene, camera);
        return;
    }

    let move = new THREE.Vector3(0,0,0);
    // Teclado - WASD e Setas Direcionais
    if(keys.w || keys.arrowup) move.z -= 1; 
    if(keys.s || keys.arrowdown) move.z += 1;
    if(keys.a || keys.arrowleft) move.x -= 1; 
    if(keys.d || keys.arrowright) move.x += 1;
    // Joystick Mobile
    if(isJoyactive){ move.x = joyStickVector.x; move.z = joyStickVector.y; }

    if(move.length() > 0.05){
        let speed = 0.35 + (equipped.boots ? equipped.boots.speed : 0);
        move.normalize().multiplyScalar(speed);
        hero.position.add(move); lastDir.copy(move);
        hero.rotation.y = Math.atan2(move.x, move.z);
    }

    if(time - lastSpawnTime > 2500){ if(monsters.length < 15) spawnMonster(Math.random()>0.97); lastSpawnTime = time; }
    
    // Atualizar bioma baseado no nível
    updateBiome();
    
    player.sp = Math.min(player.maxSp + (equipped.cape?.sp||0), player.sp+0.1);

    // Coletar itens do chão
    for(let i = droppedItems.length - 1; i >= 0; i--) {
        let drop = droppedItems[i];
        
        // Animação do item (girar e flutuar)
        drop.mesh.rotation.y += 0.03;
        drop.mesh.position.y = 0.3 + Math.sin(time * 0.005 + i) * 0.1;
        
        // Checar se jogador está perto para coletar
        if(hero.position.distanceTo(drop.mesh.position) < 1.5) {
            inventory.push(drop.item);
            floatingText("📦 " + drop.item.name, hero.position, "cyan");
            log("<span style='color:cyan'>Coletou: " + drop.item.icon + " " + drop.item.name + "</span>");
            scene.remove(drop.mesh);
            droppedItems.splice(i, 1);
            continue;
        }
        
        // Remover item após tempo limite
        drop.life--;
        if(drop.life <= 0) {
            scene.remove(drop.mesh);
            droppedItems.splice(i, 1);
        }
    }

    // Fireball
    for(let i=fireballs.length-1; i>=0; i--){
        let f = fireballs[i]; f.mesh.position.add(f.dir.clone().multiplyScalar(0.8)); f.life--;
        monsters.forEach(m=>{
            if(f.mesh.position.distanceTo(m.position)<3.5){
                m.userData.hp -= 40; floatingText("-40", m.position, "red"); f.life=0;
                if(m.userData.hp <= 0) killMonster(m);
            }
        });
        if(f.life<=0){ scene.remove(f.mesh); fireballs.splice(i,1); }
    }

    // Monstros - animação de respiração e atualização
    monsters.forEach((m)=>{
        let d = hero.position.distanceTo(m.position);
        if (d <= 1000) {
            m.visible = true;
            
            // Animação de respiração (pulsar)
            if(m.userData.mesh){
                let breathe = Math.sin(time * 0.003 + m.userData.breatheOffset) * 0.05 + 1;
                m.userData.mesh.scale.set(breathe, breathe, breathe);
            }
            
            if(d < 40) m.position.add(new THREE.Vector3().subVectors(hero.position, m.position).normalize().multiplyScalar(0.06));
            if(d < 2.6 && time - m.userData.lastAttack > 1500){
                let dmg = Math.max(1, m.userData.atk-player.def);
                player.hp -= dmg; m.userData.lastAttack=time; floatingText("-"+dmg, hero.position, "red");
                
                // Verificar se tem poção no inventário e usar automaticamente se HP < 30%
                let maxHpTotal = player.maxHp + (equipped.ring1?.hp||0) + (equipped.ring2?.hp||0);
                let hpPercent = player.hp / maxHpTotal;
                if(player.hp <= 0 || hpPercent < 0.3) {
                    // Procurar poção no inventário
                    let potionIndex = inventory.findIndex(it => it.slot === "consumable" && it.quantity > 0);
                    if(potionIndex >= 0) {
                        let potion = inventory[potionIndex];
                        player.hp = Math.min(maxHpTotal, player.hp + potion.heal);
                        potion.quantity--;
                        floatingText("🧪 +" + potion.heal + " HP", hero.position, "lime");
                        log("<span style='color:cyan'>Poção usada automaticamente!</span>");
                        if(potion.quantity <= 0) {
                            inventory.splice(potionIndex, 1);
                        }
                        updatePanels();
                    }
                }
                
                if(player.hp<=0){ 
                    // Game Over - não revive mais automaticamente
                    showGameOver();
                    return;
                }
            }
            let v=m.position.clone().project(camera);
            if(v.z < 1){
                m.userData.ui.bar.style.display = "block"; m.userData.label.style.display = "block";
                let x=(v.x*.5+.5)*innerWidth, y=(-v.y*.5+.5)*innerHeight;
                m.userData.ui.bar.style.left=(x-25)+"px"; m.userData.ui.bar.style.top=(y-28)+"px";
                m.userData.ui.fill.style.width=(m.userData.hp/m.userData.maxHp*100)+"%";
                m.userData.label.style.left=(x-45)+"px"; m.userData.label.style.top=(y-48)+"px";
                m.userData.label.innerHTML=`${m.userData.name} Lv.${m.userData.level}`;
            } else { m.userData.ui.bar.style.display = "none"; m.userData.label.style.display = "none"; }
        } else { m.visible = false; m.userData.ui.bar.style.display = "none"; m.userData.label.style.display = "none"; }
    });
    
    // Atualizar partículas
    for(let i=visuals.length-1; i>=0; i--){
        let p = visuals[i];
        if(p.userData.velocity){
            p.position.add(p.userData.velocity);
            p.userData.velocity.y -= 0.015; // gravidade
            p.userData.life--;
            p.rotation.x += 0.1;
            p.rotation.z += 0.1;
            if(p.userData.life <= 0){
                scene.remove(p);
                visuals.splice(i, 1);
            }
        }
    }

    floatTexts.forEach((f,i)=>{
        f.pos.y+=.05; let v=f.pos.clone().project(camera);
        f.div.style.left=(v.x*.5+.5)*innerWidth+"px"; f.div.style.top=(-v.y*.5+.5)*innerHeight+"px";
        f.div.innerHTML=f.txt; if(--f.life<=0){ f.div.remove(); floatTexts.splice(i,1); }
    });

    let hv=hero.position.clone().project(camera);
    heroLabel.style.left=((hv.x*.5+.5)*innerWidth-65)+"px"; heroLabel.style.top=((-hv.y*.5+.5)*innerHeight-85)+"px";

    camera.position.set(hero.position.x, 14, hero.position.z+14);
    camera.lookAt(hero.position);
    renderer.render(scene, camera);

    hp.style.width=(player.hp/(player.maxHp+(equipped.ring1?.hp||0)+(equipped.ring2?.hp||0))*100)+"%";
    sp.style.width=(player.sp/(player.maxSp+(equipped.cape?.sp||0))*100)+"%";
    xp.style.width=(player.xp/player.next*100)+"%";
    goldDisplay.innerText = "Gold: " + player.gold;

    // MINI-MAPA
    ctxM.clearRect(0, 0, 180, 180);
    ctxM.fillStyle = "rgba(0, 40, 20, 0.7)"; ctxM.fillRect(0,0,180,180);
    const centerX = 90, centerZ = 90, mapScale = 1.3;
    
    // Mostrar itens no minimapa
    droppedItems.forEach(drop => {
        const dist = drop.mesh.position.distanceTo(hero.position);
        if (dist <= 1000) {
            const mx = centerX + (drop.mesh.position.x - hero.position.x) * mapScale;
            const mz = centerZ + (drop.mesh.position.z - hero.position.z) * mapScale;
            if(Math.sqrt((mx-90)**2 + (mz-90)**2) < 70) {
                ctxM.fillStyle = "#ffd700"; // Dourado para itens
                ctxM.beginPath(); ctxM.arc(mx, mz, 2, 0, Math.PI*2); ctxM.fill();
            }
        }
    });
    
    monsters.forEach(m => {
        const dist = m.position.distanceTo(hero.position);
        if (dist <= 1000) {
            const mx = centerX + (m.position.x - hero.position.x) * mapScale;
            const mz = centerZ + (m.position.z - hero.position.z) * mapScale;
            if(Math.sqrt((mx-90)**2 + (mz-90)**2) < 70) {
                ctxM.fillStyle = m.userData.isBoss ? "#ff0000" : "#ffaa00";
                ctxM.beginPath(); ctxM.arc(mx, mz, 3, 0, Math.PI*2); ctxM.fill();
            }
        }
    });
    ctxM.fillStyle = "white"; ctxM.beginPath(); ctxM.arc(centerX, centerZ, 4, 0, Math.PI*2); ctxM.fill();
}

// Adicionar árvores/rochas para decorar biomas (decorações simples)
function addBiomeDecorations() {
    // Limpar decorações antigas
    visuals.forEach(v => {
        if(v.userData.isDecoration) {
            scene.remove(v);
            visuals.splice(visuals.indexOf(v), 1);
        }
    });
    
    // Adicionar novas decorações baseadas no bioma
    let decorationCount = 30;
    for(let i = 0; i < decorationCount; i++) {
        let deco;
        let x = (Math.random() - 0.5) * 400;
        let z = (Math.random() - 0.5) * 400;
        
        if(currentBiome === 1) { // Forest - árvores
            deco = new THREE.Group();
            let trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 2, 6), new THREE.MeshStandardMaterial({color: 0x4a3728}));
            trunk.position.y = 1;
            deco.add(trunk);
            let leaves = new THREE.Mesh(new THREE.ConeGeometry(1.5, 3, 8), new THREE.MeshStandardMaterial({color: 0x2d5a2d}));
            leaves.position.y = 3;
            deco.add(leaves);
        } else if(currentBiome === 2) { // Desert - cactos
            deco = new THREE.Group();
            let cactus = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 2, 8), new THREE.MeshStandardMaterial({color: 0x3d8b3d}));
            cactus.position.y = 1;
            deco.add(cactus);
        } else if(currentBiome === 3) { // Snow - rochas cobertas de neve
            deco = new THREE.Mesh(new THREE.DodecahedronGeometry(0.8), new THREE.MeshStandardMaterial({color: 0xe8f4f8}));
            deco.position.y = 0.4;
        } else if(currentBiome === 4) { // Volcanic - pedras vulcânicas
            deco = new THREE.Mesh(new THREE.DodecahedronGeometry(0.6), new THREE.MeshStandardMaterial({color: 0x333333, emissive: 0x331111}));
            deco.position.y = 0.3;
        } else { // Plains - flores/arbustos
            deco = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({color: 0x44aa44}));
            deco.position.y = 0.2;
        }
        
        if(deco) {
            deco.position.set(x, 0, z);
            deco.userData = { isDecoration: true };
            scene.add(deco);
            visuals.push(deco);
        }
    }
}

// Chama decorações quando muda de bioma
let lastBiomeForDeco = -1;

// Adicionar decorações iniciais
addBiomeDecorations();

// Overlay e tela de Game Over
let gameOverOverlay = document.createElement('div');
gameOverOverlay.style.cssText = 'display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; color:white; font-size:48px; font-weight:bold; align-items:center; justify-content:center; flex-direction:column; text-align:center;';
gameOverOverlay.innerHTML = `
    <div style="color:red; font-size:72px; margin-bottom:20px;">☠️ GAME OVER ☠️</div>
    <div id="gameOverStats" style="font-size:24px; margin-bottom:30px; color:#aaa;"></div>
    <div id="reviveOptions" style="display:flex; gap:20px;">
        <button id="btnRevive" onclick="revivePlayer()" style="background:linear-gradient(135deg, #4CAF50, #45a049); border:none; color:white; padding:15px 40px; font-size:20px; border-radius:10px; cursor:pointer; font-weight:bold;">✨ Reviver (50% Gold)</button>
        <button onclick="restartGame()" style="background:linear-gradient(135deg, #f44336, #da1e1e); border:none; color:white; padding:15px 40px; font-size:20px; border-radius:10px; cursor:pointer; font-weight:bold;">🔄 Reiniciar</button>
    </div>
`;
document.body.appendChild(gameOverOverlay);

function showGameOver() {
    gamePaused = true;
    let cost = Math.floor(player.gold * 0.5);
    let canRevive = player.gold >= 10; // Precisa de pelo menos 10 gold para reviver (metade seria 5)
    
    document.getElementById('gameOverStats').innerHTML = `
        <div>Nível Alcançado: <span style="color:gold">${player.level}</span></div>
        <div>Gold Acumulado: <span style="color:gold">${player.gold}</span></div>
        ${canRevive ? `<div style="margin-top:10px; font-size:18px;">Custa ${cost} gold para reviver</div>` : ''}
    `;
    
    // Esconde opções de revive se não tiver gold suficiente
    if(canRevive) {
        document.getElementById('reviveOptions').style.display = 'flex';
    } else {
        document.getElementById('reviveOptions').style.display = 'none';
        document.getElementById('gameOverStats').innerHTML += `<div style=\"margin-top:15px; color:red;\">Sem gold suficiente para reviver! Retornando ao início...</div>`;
    }
    
    gameOverOverlay.style.display = 'flex';
    
    // Se não tem gold para reviver, volta automaticamente após 2 segundos
    if(!canRevive) {
        setTimeout(() => {
            restartGame();
        }, 2000);
    }
}

function revivePlayer() {
    let cost = Math.floor(player.gold * 0.5);
    if(player.gold >= cost) {
        player.gold -= cost;
        player.hp = player.maxHp + (equipped.ring1?.hp||0) + (equipped.ring2?.hp||0);
        player.sp = player.maxSp + (equipped.cape?.sp||0);
        hero.position.set(0, 0, 0);
        gameOverOverlay.style.display = 'none';
        gamePaused = false;
        log("<span style='color:cyan'>Você reviveu! -" + cost + " gold</span>");
        updatePanels();
    } else {
        log("<span style='color:red'>Gold insuficiente para reviver!</span>");
    }
}

function restartGame() {
    // Resetar variáveis do jogo para o level 1
    player = { level:1, xp:0, next:50, gold:0, baseAtk:10, baseDef:3, atk:10, def:3, hp:100, maxHp:100, sp:100, maxSp:100 };
    inventory = [];
    monsters = [];
    droppedItems = [];
    fireballs = [];
    equipped = { weapon:null, shield:null, cape:null, boots:null, ring1:null, ring2:null };
    bossSpawned = false;
    currentBiome = 0;
    
    // Resetar posição do herói
    hero.position.set(0, 0, 0);
    
    // Remover monstros da cena
    monsters.forEach(m => {
        scene.remove(m.mesh);
        if(m.mesh.userData.ui && m.mesh.userData.ui.bar) {
            m.mesh.userData.ui.bar.remove();
        }
        if(m.mesh.userData.label) {
            m.mesh.userData.label.remove();
        }
    });
    monsters = [];
    
    // Remover itens do chão
    droppedItems.forEach(d => {
        scene.remove(d.mesh);
        if(d.mesh.userData.label) {
            d.mesh.userData.label.remove();
        }
    });
    droppedItems = [];
    
    // Limpar textos flutuantes
    floatTexts.forEach(f => f.div.remove());
    floatTexts = [];
    
    // Limpar fireballs
    fireballs.forEach(f => scene.remove(f.mesh));
    fireballs = [];
    
    // Atualizar UI
    hp.style.width=(player.hp/(player.maxHp+(equipped.ring1?.hp||0)+(equipped.ring2?.hp||0))*100)+"%";
    sp.style.width=(player.sp/(player.maxSp+(equipped.cape?.sp||0))*100)+"%";
    xp.style.width=(player.xp/player.next*100)+"%";
    goldDisplay.innerText = "Gold: " + player.gold;
    applyEquipVisual();
    recalcStats();
    
    // Esconder game over overlay
    gameOverOverlay.style.display = 'none';
    statusWindow.style.display = 'none';
    shopWindow.style.display = 'none';
    
    gamePaused = false;
    
    log("<span style='color:cyan'>🔄 Voltou para o Level 1!</span>");
}

animate();
log("Eldoria Mobile Restaurado!");
log("<span style='color:gold'>🎮 Derrote inimigos, colete itens e explore os biomas!</span>");
</script>
</body>
</html>
