<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozzy - O Gatinho Rockstar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #222;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            border: 4px solid #fff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            text-align: center;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: white;
            z-index: 20;
            border: 3px solid #ffd700;
            max-width: 400px;
        }

        #startScreen h1, #gameOverScreen h1 {
            font-size: 36px;
            margin-bottom: 15px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #startScreen p, #gameOverScreen p {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        button {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        button:hover {
            background: #ffed4a;
            transform: scale(1.05);
        }

        .hidden {
            display: none !important;
        }

        #scoreDisplay {
            font-size: 28px;
        }

        #highScore {
            font-size: 20px;
            color: #ffd700;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        
        <div id="ui">
            <div id="scoreDisplay">Pontos: 0</div>
            <div id="highScore">Recorde: 0</div>
        </div>

        <div id="startScreen">
            <h1>🎸 OZZY 🎸</h1>
            <p>Ajude o gatinho Ozzy a atravessar o cenário!</p>
            <p>Pule sobre os obstáculos e colete moedas!</p>
            <p><strong>Controles:</strong><br>ESPAÇO ou CLIQUE para pular<br>Setas para mover</p>
            <button id="startBtn">JOGAR</button>
        </div>

        <div id="gameOverScreen" class="hidden">
            <h1>GAME OVER</h1>
            <p id="finalScore">Pontuação: 0</p>
            <p id="newRecord" class="hidden" style="color: #ffd700; font-weight: bold;">NOVO RECORDE! 🎉</p>
            <button id="restartBtn">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const highScoreDisplay = document.getElementById('highScore');
        const finalScoreDisplay = document.getElementById('finalScore');
        const newRecordDisplay = document.getElementById('newRecord');

        // Game state
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('ozzyHighScore') || 0;
        highScoreDisplay.textContent = `Recorde: ${highScore}`;

        // Background color
        const bgColor = '#674ea7';

        // Ozzy the cat (Mario-style platformer)
        const ozzy = {
            x: 100,
            y: 350,
            width: 50,
            height: 50,
            velocityY: 0,
            velocityX: 0,
            jumping: false,
            onGround: false,
            speed: 5,
            jumpForce: -12,
            gravity: 0.6,
            frame: 0,
            direction: 1 // 1 = right, -1 = left
        };

        // Platforms (like Mario)
        let platforms = [];
        let obstacles = [];
        let coins = [];
        let clouds = [];
        let groundY = 400;

        // Input handling
        const keys = {};
        let mouseX = 0;
        let mouseY = 0;
        let isMouseDown = false;

        // Initialize game
        function init() {
            ozzy.x = 100;
            ozzy.y = 350;
            ozzy.velocityY = 0;
            ozzy.velocityX = 0;
            ozzy.jumping = false;
            ozzy.onGround = false;
            score = 0;
            scoreDisplay.textContent = `Pontos: ${score}`;
            
            // Create platforms
            platforms = [
                { x: 0, y: groundY, width: 800, height: 50 }, // Ground
                { x: 200, y: 320, width: 100, height: 20 },
                { x: 400, y: 280, width: 100, height: 20 },
                { x: 600, y: 240, width: 100, height: 20 },
                { x: 300, y: 200, width: 80, height: 20 },
                { x: 500, y: 160, width: 80, height: 20 }
            ];

            // Create obstacles
            obstacles = [
                { x: 300, y: groundY - 30, width: 30, height: 30, type: 'spike' },
                { x: 500, y: groundY - 30, width: 30, height: 30, type: 'spike' },
                { x: 700, y: groundY - 30, width: 30, height: 30, type: 'spike' }
            ];

            // Create coins
            coins = [
                { x: 230, y: 280, width: 20, height: 20, collected: false },
                { x: 430, y: 240, width: 20, height: 20, collected: false },
                { x: 630, y: 200, width: 20, height: 20, collected: false },
                { x: 330, y: 160, width: 20, height: 20, collected: false },
                { x: 530, y: 120, width: 20, height: 20, collected: false },
                { x: 750, y: groundY - 50, width: 20, height: 20, collected: false }
            ];

            // Create clouds
            clouds = [];
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * 800,
                    y: Math.random() * 150 + 20,
                    width: Math.random() * 60 + 40,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }

        // Draw Ozzy (round black cat with pointy ears, green eyes, like Ozzy Osbourne)
        function drawOzzy() {
            ctx.save();
            ctx.translate(ozzy.x + ozzy.width/2, ozzy.y + ozzy.height/2);
            ctx.scale(ozzy.direction, 1); // Flip based on direction

            // Body (round black cat)
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(0, 5, 25, 0, Math.PI * 2);
            ctx.fill();

            // Ears (pointy)
            ctx.fillStyle = '#000';
            // Left ear
            ctx.beginPath();
            ctx.moveTo(-15, -15);
            ctx.lineTo(-25, -35);
            ctx.lineTo(-5, -25);
            ctx.fill();
            // Right ear
            ctx.beginPath();
            ctx.moveTo(15, -15);
            ctx.lineTo(25, -35);
            ctx.lineTo(5, -25);
            ctx.fill();

            // Inner ears (pink)
            ctx.fillStyle = '#ffb6c1';
            // Left inner ear
            ctx.beginPath();
            ctx.moveTo(-15, -15);
            ctx.lineTo(-22, -30);
            ctx.lineTo(-8, -22);
            ctx.fill();
            // Right inner ear
            ctx.beginPath();
            ctx.moveTo(15, -15);
            ctx.lineTo(22, -30);
            ctx.lineTo(8, -22);
            ctx.fill();

            // Eyes (big green eyes)
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.ellipse(-8, -5, 8, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(8, -5, 8, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // Pupils (vertical black slits)
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(-8, -5, 2, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(8, -5, 2, 6, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eye shine
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-10, -8, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(6, -8, 2, 0, Math.PI * 2);
            ctx.fill();

            // Nose (pink)
            ctx.fillStyle = '#ffb6c1';
            ctx.beginPath();
            ctx.arc(0, 5, 4, 0, Math.PI * 2);
            ctx.fill();

            // Mouth (rockstar grin)
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 10, 6, 0, Math.PI);
            ctx.stroke();

            // Whiskers
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            // Left whiskers
            ctx.beginPath();
            ctx.moveTo(-10, 5);
            ctx.lineTo(-30, 0);
            ctx.moveTo(-10, 8);
            ctx.lineTo(-30, 8);
            ctx.moveTo(-10, 11);
            ctx.lineTo(-30, 16);
            ctx.stroke();
            // Right whiskers
            ctx.beginPath();
            ctx.moveTo(10, 5);
            ctx.lineTo(30, 0);
            ctx.moveTo(10, 8);
            ctx.lineTo(30, 8);
            ctx.moveTo(10, 11);
            ctx.lineTo(30, 16);
            ctx.stroke();

            // Arms (visible when jumping)
            ctx.fillStyle = '#000';
            if (ozzy.jumping) {
                // Arms up when jumping
                ctx.beginPath();
                ctx.arc(-18, 0, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(18, 0, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // Paw pads (pink)
                ctx.fillStyle = '#ffb6c1';
                ctx.beginPath();
                ctx.arc(-18, 2, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(18, 2, 3, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Arms down when on ground
                ctx.beginPath();
                ctx.arc(-18, 15, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(18, 15, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // Paw pads (pink)
                ctx.fillStyle = '#ffb6c1';
                ctx.beginPath();
                ctx.arc(-18, 17, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(18, 17, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            // Legs and feet
            ctx.fillStyle = '#000';
            if (ozzy.jumping) {
                // Legs tucked when jumping
                ctx.beginPath();
                ctx.arc(-12, 20, 9, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, 20, 9, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Legs standing
                ctx.beginPath();
                ctx.arc(-12, 22, 9, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, 22, 9, 0, Math.PI * 2);
                ctx.fill();
            }

            // Paw pads on feet (pink)
            ctx.fillStyle = '#ffb6c1';
            if (ozzy.jumping) {
                ctx.beginPath();
                ctx.arc(-12, 22, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, 22, 3, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.arc(-12, 24, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, 24, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            // Tail (animated)
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.beginPath();
            const tailWag = Math.sin(Date.now() / 200) * 10;
            ctx.moveTo(20, 10);
            ctx.quadraticCurveTo(35, 5 + tailWag, 45, -5 + tailWag);
            ctx.stroke();

            ctx.restore();
        }

        // Draw background
        function drawBackground() {
            // Sky
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            clouds.forEach(cloud => {
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.width/3, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.width/3, cloud.y - 10, cloud.width/4, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.width/2, cloud.y, cloud.width/3, 0, Math.PI * 2);
                ctx.fill();
            });

            // Ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            
            // Grass on top
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, groundY, canvas.width, 10);
        }

        // Draw platforms
        function drawPlatforms() {
            platforms.forEach(platform => {
                // Platform block
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                
                // Top grass/brick detail
                ctx.fillStyle = '#A0522D';
                ctx.fillRect(platform.x, platform.y, platform.width, 5);
                
                // Brick pattern
                ctx.strokeStyle = '#654321';
                ctx.lineWidth = 1;
                for (let i = 0; i < platform.width; i += 20) {
                    ctx.strokeRect(platform.x + i, platform.y + 5, 20, platform.height - 5);
                }
            });
        }

        // Draw obstacles
        function drawObstacles() {
            obstacles.forEach(obs => {
                if (obs.type === 'spike') {
                    ctx.fillStyle = '#808080';
                    ctx.beginPath();
                    ctx.moveTo(obs.x, obs.y + obs.height);
                    ctx.lineTo(obs.x + obs.width/2, obs.y);
                    ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Spike detail
                    ctx.strokeStyle = '#696969';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(obs.x + obs.width/2, obs.y);
                    ctx.lineTo(obs.x + obs.width/2, obs.y + obs.height);
                    ctx.stroke();
                }
            });
        }

        // Draw coins
        function drawCoins() {
            coins.forEach(coin => {
                if (!coin.collected) {
                    // Coin glow
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                    ctx.beginPath();
                    ctx.arc(coin.x + coin.width/2, coin.y + coin.height/2, 15, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Coin
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(coin.x + coin.width/2, coin.y + coin.height/2, 10, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Coin shine
                    ctx.fillStyle = '#FFF8DC';
                    ctx.beginPath();
                    ctx.arc(coin.x + coin.width/2 - 3, coin.y + coin.height/2 - 3, 4, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Dollar sign
                    ctx.fillStyle = '#B8860B';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('$', coin.x + coin.width/2, coin.y + coin.height/2);
                }
            });
        }

        // Update game logic
        function update() {
            if (!gameRunning) return;

            // Apply gravity
            ozzy.velocityY += ozzy.gravity;
            ozzy.y += ozzy.velocityY;
            ozzy.x += ozzy.velocityX;

            // Horizontal movement
            ozzy.velocityX = 0;
            if (keys['ArrowLeft'] || keys['a']) {
                ozzy.velocityX = -ozzy.speed;
                ozzy.direction = -1;
            }
            if (keys['ArrowRight'] || keys['d']) {
                ozzy.velocityX = ozzy.speed;
                ozzy.direction = 1;
            }

            // Keep Ozzy in bounds
            if (ozzy.x < 0) ozzy.x = 0;
            if (ozzy.x + ozzy.width > canvas.width) ozzy.x = canvas.width - ozzy.width;

            // Check platform collisions
            ozzy.onGround = false;
            platforms.forEach(platform => {
                if (ozzy.y + ozzy.height <= platform.y + ozzy.velocityY &&
                    ozzy.y + ozzy.height + ozzy.velocityY >= platform.y &&
                    ozzy.x + ozzy.width > platform.x &&
                    ozzy.x < platform.x + platform.width) {
                    
                    ozzy.y = platform.y - ozzy.height;
                    ozzy.velocityY = 0;
                    ozzy.onGround = true;
                    ozzy.jumping = false;
                }
            });

            // Jump
            if ((keys[' '] || keys['ArrowUp'] || keys['w'] || isMouseDown) && ozzy.onGround) {
                ozzy.velocityY = ozzy.jumpForce;
                ozzy.jumping = true;
                ozzy.onGround = false;
            }

            // Check obstacle collisions
            obstacles.forEach(obs => {
                if (ozzy.x < obs.x + obs.width &&
                    ozzy.x + ozzy.width > obs.x &&
                    ozzy.y < obs.y + obs.height &&
                    ozzy.y + ozzy.height > obs.y) {
                    gameOver();
                }
            });

            // Check coin collisions
            coins.forEach(coin => {
                if (!coin.collected &&
                    ozzy.x < coin.x + coin.width &&
                    ozzy.x + ozzy.width > coin.x &&
                    ozzy.y < coin.y + coin.height &&
                    ozzy.y + ozzy.height > coin.y) {
                    coin.collected = true;
                    score += 10;
                    scoreDisplay.textContent = `Pontos: ${score}`;
                }
            });

            // Check if fell off screen
            if (ozzy.y > canvas.height) {
                gameOver();
            }

            // Update clouds
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < 0) {
                    cloud.x = canvas.width + cloud.width;
                    cloud.y = Math.random() * 150 + 20;
                }
            });

            // Animation frame
            ozzy.frame++;
        }

        // Draw everything
        function draw() {
            drawBackground();
            drawPlatforms();
            drawObstacles();
            drawCoins();
            drawOzzy();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        // Start game
        function startGame() {
            init();
            gameRunning = true;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameLoop();
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            finalScoreDisplay.textContent = `Pontuação: ${score}`;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('ozzyHighScore', highScore);
                highScoreDisplay.textContent = `Recorde: ${highScore}`;
                newRecordDisplay.classList.remove('hidden');
            } else {
                newRecordDisplay.classList.add('hidden');
            }
            
            gameOverScreen.classList.remove('hidden');
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ' && !gameRunning && !startScreen.classList.contains('hidden')) {
                startGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousedown', () => {
            isMouseDown = true;
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isMouseDown = false;
        });

        // Initial draw
        drawBackground();
        drawPlatforms();
        drawOzzy();
    </script>
</body>
</html>
