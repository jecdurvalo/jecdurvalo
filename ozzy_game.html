<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ozzy Final - Aventura do Gatinho</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none; /* Previne zoom e scroll no celular */
            user-select: none; /* Previne seleção de texto */
            -webkit-user-select: none;
        }

        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 600px;
            background-color: #674ea7; /* Cor de fundo solicitada */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Interface de UI (Placar, Mensagens) */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .hud {
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            display: flex;
            justify-content: space-between;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            pointer-events: auto;
            z-index: 10;
        }

        h1 { font-size: 40px; margin-bottom: 10px; color: #00ff00; text-shadow: 3px 3px 0 #000; }
        p { font-size: 18px; margin-bottom: 20px; text-align: center; }
        
        button {
            padding: 15px 30px;
            font-size: 20px;
            background: #00ff00;
            border: 4px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }

        /* Controles Mobile */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: 100px;
            display: none; /* Oculto por padrão, aparece via JS se for touch */
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: auto;
            z-index: 5;
        }

        .control-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: white;
            user-select: none;
        }
        
        .control-btn:active { background: rgba(255, 255, 255, 0.6); }
        .btn-group { display: flex; gap: 15px; }

        /* Mostrar controles apenas em telas pequenas ou se detectado touch */
        @media (hover: none) and (pointer: coarse) {
            #mobile-controls { display: flex; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="hud">
            <span id="scoreDisplay">Pontos: 0</span>
            <span id="levelDisplay">Fase: 1</span>
        </div>
    </div>

    <div id="start-screen">
        <h1>OZZY FINAL</h1>
        <p>Ajude o Ozzy a desviar das aranhas e morcegos!</p>
        <p>PC: Setas / Espaço<br>Celular: Botões na tela</p>
        <button onclick="startGame()">JOGAR</button>
    </div>

    <div id="game-over-screen" style="display: none;">
        <h1 style="color: red;">GAME OVER</h1>
        <p>Pontuação Final: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">TENTAR DE NOVO</button>
    </div>

    <div id="mobile-controls">
        <div class="btn-group">
            <div class="control-btn" id="btn-left">←</div>
            <div class="control-btn" id="btn-right">→</div>
        </div>
        <div class="control-btn" id="btn-jump">↑</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Elementos de UI
    const scoreEl = document.getElementById('scoreDisplay');
    const levelEl = document.getElementById('levelDisplay');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreEl = document.getElementById('finalScore');
    const mobileControls = document.getElementById('mobile-controls');

    // Estado do Jogo
    let gameRunning = false;
    let animationId;
    let score = 0;
    let level = 1;
    let frames = 0;

    // Configuração Responsiva do Canvas
    function resizeCanvas() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        
        // Detectar se é mobile para mostrar controles
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            mobileControls.style.display = 'flex';
        }
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Inputs
    const keys = {
        right: false,
        left: false,
        up: false
    };

    // Listeners de Teclado
    document.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
            if (!keys.up && gameRunning) ozzy.jump();
            keys.up = true;
        }
    });

    document.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
    });

    // Listeners de Toque (Mobile)
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');
    const btnJump = document.getElementById('btn-jump');

    const addTouch = (elem, key) => {
        elem.addEventListener('touchstart', (e) => { e.preventDefault(); if(key === 'up' && gameRunning) ozzy.jump(); keys[key] = true; });
        elem.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
        elem.addEventListener('mousedown', (e) => { if(key === 'up' && gameRunning) ozzy.jump(); keys[key] = true; });
        elem.addEventListener('mouseup', (e) => { keys[key] = false; });
    };

    addTouch(btnLeft, 'left');
    addTouch(btnRight, 'right');
    addTouch(btnJump, 'up');

    // Entidade Ozzy
    const ozzy = {
        x: 50,
        y: 0,
        width: 50,
        height: 50,
        vx: 0,
        vy: 0,
        speed: 5,
        jumpStrength: -13,
        gravity: 0.6,
        grounded: false,
        direction: 1, // 1 direita, -1 esquerda
        jumping: false,

        update: function() {
            // Movimento Horizontal
            if (keys.right) {
                this.vx = this.speed;
                this.direction = 1;
            } else if (keys.left) {
                this.vx = -this.speed;
                this.direction = -1;
            } else {
                this.vx *= 0.8; // Fricção
            }

            this.x += this.vx;

            // Limites da tela
            if (this.x < 0) this.x = 0;
            if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

            // Gravidade e Pulo
            this.vy += this.gravity;
            this.y += this.vy;

            // Colisão com o chão
            if (this.y + this.height > canvas.height - 50) { // 50 é a altura do "chão" visual
                this.y = canvas.height - 50 - this.height;
                this.vy = 0;
                this.grounded = true;
                this.jumping = false;
            } else {
                this.grounded = false;
                this.jumping = true;
            }
        },

        jump: function() {
            if (this.grounded) {
                this.vy = this.jumpStrength;
                this.grounded = false;
                this.jumping = true;
            }
        },

        draw: function() {
            // Draw Ozzy (round black cat with pointy ears, green eyes, like Ozzy Osbourne)
            ctx.save();
            ctx.translate(this.x + this.width/2, this.y + this.height/2);
            ctx.scale(this.direction, 1); // Flip based on direction

            // Body (round black cat)
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(0, 5, 25, 0, Math.PI * 2);
            ctx.fill();

            // Ears (pointy)
            ctx.fillStyle = '#000';
            // Left ear
            ctx.beginPath();
            ctx.moveTo(-15, -15);
            ctx.lineTo(-25, -35);
            ctx.lineTo(-5, -25);
            ctx.fill();
            // Right ear
            ctx.beginPath();
            ctx.moveTo(15, -15);
            ctx.lineTo(25, -35);
            ctx.lineTo(5, -25);
            ctx.fill();

            // Inner ears (pink)
            ctx.fillStyle = '#ffb6c1';
            // Left inner ear
            ctx.beginPath();
            ctx.moveTo(-15, -15);
            ctx.lineTo(-22, -30);
            ctx.lineTo(-8, -22);
            ctx.fill();
            // Right inner ear
            ctx.beginPath();
            ctx.moveTo(15, -15);
            ctx.lineTo(22, -30);
            ctx.lineTo(8, -22);
            ctx.fill();

            // Eyes (big green eyes)
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.ellipse(-8, -5, 8, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(8, -5, 8, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // Pupils (vertical black slits)
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(-8, -5, 2, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(8, -5, 2, 6, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eye shine
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-10, -8, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(6, -8, 2, 0, Math.PI * 2);
            ctx.fill();

            // Nose (pink)
            ctx.fillStyle = '#ffb6c1';
            ctx.beginPath();
            ctx.arc(0, 5, 4, 0, Math.PI * 2);
            ctx.fill();

            // Mouth (rockstar grin)
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 10, 6, 0, Math.PI);
            ctx.stroke();

            // Whiskers
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            // Left whiskers
            ctx.beginPath();
            ctx.moveTo(-10, 5);
            ctx.lineTo(-30, 0);
            ctx.moveTo(-10, 8);
            ctx.lineTo(-30, 8);
            ctx.moveTo(-10, 11);
            ctx.lineTo(-30, 16);
            ctx.stroke();
            // Right whiskers
            ctx.beginPath();
            ctx.moveTo(10, 5);
            ctx.lineTo(30, 0);
            ctx.moveTo(10, 8);
            ctx.lineTo(30, 8);
            ctx.moveTo(10, 11);
            ctx.lineTo(30, 16);
            ctx.stroke();

            // Arms (visible when jumping)
            ctx.fillStyle = '#000';
            if (this.jumping) {
                // Arms up when jumping
                ctx.beginPath();
                ctx.arc(-18, 0, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(18, 0, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // Paw pads (pink)
                ctx.fillStyle = '#ffb6c1';
                ctx.beginPath();
                ctx.arc(-18, 2, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(18, 2, 3, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Arms down when on ground
                ctx.beginPath();
                ctx.arc(-18, 15, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(18, 15, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // Paw pads (pink)
                ctx.fillStyle = '#ffb6c1';
                ctx.beginPath();
                ctx.arc(-18, 17, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(18, 17, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            // Legs and feet
            ctx.fillStyle = '#000';
            if (this.jumping) {
                // Legs tucked when jumping
                ctx.beginPath();
                ctx.arc(-12, 20, 9, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, 20, 9, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Legs standing
                ctx.beginPath();
                ctx.arc(-12, 22, 9, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, 22, 9, 0, Math.PI * 2);
                ctx.fill();
            }

            // Paw pads on feet (pink)
            ctx.fillStyle = '#ffb6c1';
            if (this.jumping) {
                ctx.beginPath();
                ctx.arc(-12, 22, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, 22, 3, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.arc(-12, 24, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, 24, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            // Tail (animated)
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.beginPath();
            const tailWag = Math.sin(Date.now() / 200) * 10;
            ctx.moveTo(20, 10);
            ctx.quadraticCurveTo(35, 5 + tailWag, 45, -5 + tailWag);
            ctx.stroke();

            ctx.restore();
        }
    };

    // Entidades do Jogo
    let enemies = [];
    let coins = [];
    let particles = [];

    class Enemy {
        constructor(type) {
            this.type = type; // 'spider' or 'bat'
            this.width = 40;
            this.height = 40;
            this.x = canvas.width + Math.random() * 200;
            
            if (type === 'spider') {
                this.y = canvas.height - 50 - this.height; // No chão
                this.speed = 2 + (level * 0.5);
                this.dy = 0;
            } else {
                // Morcego voando em alturas aleatórias
                this.y = Math.random() * (canvas.height - 150) + 50;
                this.speed = 3 + (level * 0.5);
                this.dy = 2;
                this.angle = 0;
            }
            this.markedForDeletion = false;
        }

        update() {
            this.x -= this.speed;
            
            if (this.type === 'bat') {
                this.angle += 0.1;
                this.y += Math.sin(this.angle) * 2;
            }

            if (this.x + this.width < 0) this.markedForDeletion = true;

            // Colisão simples (AABB)
            if (
                ozzy.x < this.x + this.width &&
                ozzy.x + ozzy.width > this.x &&
                ozzy.y < this.y + this.height &&
                ozzy.y + ozzy.height > this.y
            ) {
                gameOver();
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x + this.width/2, this.y + this.height/2);
            if (this.type === 'spider') {
                // Aranha
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(0, 0, 15, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(-5, -5, 3, 0, Math.PI*2);
                ctx.arc(5, -5, 3, 0, Math.PI*2);
                ctx.fill();
                // Pernas
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                for(let i=0; i<4; i++) {
                    ctx.beginPath();
                    ctx.moveTo(-10, 0);
                    ctx.lineTo(-25, -10 + i*5);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(10, 0);
                    ctx.lineTo(25, -10 + i*5);
                    ctx.stroke();
                }
            } else {
                // Morcego
                ctx.fillStyle = '#4a004a';
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI*2);
                ctx.fill();
                // Asas batendo
                const wingFlap = Math.sin(Date.now() / 50) * 10;
                ctx.beginPath();
                ctx.moveTo(-10, -5);
                ctx.lineTo(-25, -15 + wingFlap);
                ctx.lineTo(-10, 5);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(10, -5);
                ctx.lineTo(25, -15 - wingFlap);
                ctx.lineTo(10, 5);
                ctx.fill();
                // Olhos amarelos
                ctx.fillStyle = 'yellow';
                ctx.beginPath();
                ctx.arc(-4, -2, 2, 0, Math.PI*2);
                ctx.arc(4, -2, 2, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.restore();
        }
    }

    class Coin {
        constructor() {
            this.size = 20;
            this.x = canvas.width + Math.random() * 200;
            this.y = Math.random() * (canvas.height - 100) + 50;
            this.markedForDeletion = false;
            this.angle = 0;
        }

        update() {
            this.x -= 3;
            this.angle += 0.1;
            if (this.x + this.size < 0) this.markedForDeletion = true;

            // Colisão
            const dx = (ozzy.x + ozzy.width/2) - (this.x + this.size/2);
            const dy = (ozzy.y + ozzy.height/2) - (this.y + this.size/2);
            const distance = Math.sqrt(dx*dx + dy*dy);

            if (distance < 30) {
                score += 10;
                scoreEl.innerText = `Pontos: ${score}`;
                this.markedForDeletion = true;
                createParticles(this.x, this.y, '#ffd700');
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x + this.size/2, this.y + this.size/2);
            ctx.rotate(this.angle);
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(0, 0, 10, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#ffa500';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#ffa500';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', 0, 1);
            ctx.restore();
        }
    }

    function createParticles(x, y, color) {
        for(let i=0; i<5; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 5,
                vy: (Math.random() - 0.5) * 5,
                life: 1,
                color: color
            });
        }
    }

    function spawnEnemiesAndCoins() {
        if (frames % 120 === 0) { // A cada ~2 segundos
            enemies.push(new Enemy(Math.random() > 0.5 ? 'spider' : 'bat'));
        }
        if (frames % 150 === 0) {
            coins.push(new Coin());
        }
    }

    function drawBackground() {
        // Chão
        ctx.fillStyle = '#2e8b57';
        ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
        ctx.fillStyle = '#3cb371';
        ctx.fillRect(0, canvas.height - 50, canvas.width, 10);
        
        // Nuvens decorativas (simples)
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.beginPath();
        ctx.arc(100, 100, 30, 0, Math.PI*2);
        ctx.arc(140, 100, 40, 0, Math.PI*2);
        ctx.arc(180, 100, 30, 0, Math.PI*2);
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(canvas.width - 100, 150, 40, 0, Math.PI*2);
        ctx.arc(canvas.width - 140, 150, 50, 0, Math.PI*2);
        ctx.fill();
    }

    function checkLevelUp() {
        if (score > level * 100) {
            level++;
            levelEl.innerText = `Fase: ${level}`;
            // Efeito visual de level up
            createParticles(ozzy.x, ozzy.y, '#00ff00');
        }
    }

    function animate() {
        if (!gameRunning) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawBackground();
        
        ozzy.update();
        ozzy.draw();

        spawnEnemiesAndCoins();

        // Atualizar e desenhar inimigos
        enemies.forEach((enemy, index) => {
            enemy.update();
            enemy.draw();
            if (enemy.markedForDeletion) enemies.splice(index, 1);
        });

        // Atualizar e desenhar moedas
        coins.forEach((coin, index) => {
            coin.update();
            coin.draw();
            if (coin.markedForDeletion) coins.splice(index, 1);
        });

        // Partículas
        particles.forEach((p, index) => {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.05;
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
            if (p.life <= 0) particles.splice(index, 1);
        });

        checkLevelUp();

        frames++;
        animationId = requestAnimationFrame(animate);
    }

    function startGame() {
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        resetVariables();
        gameRunning = true;
        animate();
    }

    function resetGame() {
        startGame();
    }

    function resetVariables() {
        score = 0;
        level = 1;
        frames = 0;
        enemies = [];
        coins = [];
        particles = [];
        ozzy.x = 50;
        ozzy.y = 0;
        ozzy.vx = 0;
        ozzy.vy = 0;
        scoreEl.innerText = `Pontos: 0`;
        levelEl.innerText = `Fase: 1`;
    }

    function gameOver() {
        gameRunning = false;
        cancelAnimationFrame(animationId);
        finalScoreEl.innerText = score;
        gameOverScreen.style.display = 'flex';
    }

</script>
</body>
</html>
