<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozzizinho - A Lenda do Rock</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #fff;
        }

        canvas {
            display: block;
            background-color: #674ea7; /* Cor solicitada */
        }

        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }

        #start-screen, #game-over-screen, #level-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            z-index: 10;
        }

        h1 { font-size: 40px; margin-bottom: 10px; color: #ff00de; text-shadow: 3px 3px 0 #000; }
        p { font-size: 18px; margin-bottom: 20px; }
        button {
            padding: 15px 30px;
            font-size: 20px;
            font-family: inherit;
            background: #ff00de;
            color: white;
            border: 4px solid white;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:hover { transform: scale(1.05); background: #d900bd; }
        button:active { transform: scale(0.95); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-layer">
        <div>Fase: <span id="level-display">1</span></div>
        <div>Pontos: <span id="score-display">0</span></div>
        <div>Vidas: <span id="lives-display">3</span></div>
    </div>

    <div id="start-screen">
        <h1>OZZIZINHO</h1>
        <p>Ajude o gatinho rockstar a atravessar as fases!</p>
        <p>Setas/A-D: Mover | Espaço: Pular (Segure para pular mais alto)</p>
        <button onclick="startGame()">Começar Show</button>
    </div>

    <div id="level-screen" class="hidden">
        <h1 id="level-title">Fase 1</h1>
        <p>Prepare-se...</p>
    </div>

    <div id="game-over-screen" class="hidden">
        <h1 id="go-title">Fim de Jogo!</h1>
        <p>Pontuação Final: <span id="final-score">0</span></p>
        <button onclick="resetGame()">Tentar De Novo</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Elementos de UI
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const levelScreen = document.getElementById('level-screen');
    const levelTitle = document.getElementById('level-title');
    const scoreDisplay = document.getElementById('score-display');
    const levelDisplay = document.getElementById('level-display');
    const livesDisplay = document.getElementById('lives-display');
    const finalScoreDisplay = document.getElementById('final-score');
    const goTitle = document.getElementById('go-title');

    // Estado do Jogo
    let gameState = 'START'; // START, PLAYING, LEVEL_TRANSITION, GAMEOVER
    let frames = 0;
    let score = 0;
    let lives = 3;
    let currentLevel = 1;
    let gameSpeed = 4;

    // Inputs
    const keys = {
        right: false,
        left: false,
        up: false
    };

    // Configuração do Jogador (Ozzy)
    const player = {
        x: 100,
        y: 400,
        width: 40,
        height: 40,
        vx: 0,
        vy: 0,
        speed: 5,
        jumpStrength: -12,
        gravity: 0.6,
        grounded: false,
        facingRight: true,
        animFrame: 0
    };

    // Entidades
    let platforms = [];
    let coins = []; // Morcegos
    let enemies = []; // Aranhas
    let particles = [];

    // Definição das Fases
    const levels = [
        { // Fase 1: Introdução
            platforms: [
                {x: 0, y: 550, w: 800, h: 50}, // Chão
                {x: 200, y: 450, w: 150, h: 20},
                {x: 450, y: 350, w: 150, h: 20},
                {x: 650, y: 250, w: 100, h: 20}
            ],
            coins: [
                {x: 250, y: 410}, {x: 500, y: 310}, {x: 700, y: 210}
            ],
            enemies: [
                {x: 400, y: 520, type: 'walker'}
            ]
        },
        { // Fase 2: Pulos maiores
            platforms: [
                {x: 0, y: 550, w: 200, h: 50},
                {x: 250, y: 480, w: 100, h: 20},
                {x: 400, y: 400, w: 100, h: 20},
                {x: 550, y: 320, w: 100, h: 20},
                {x: 700, y: 240, w: 100, h: 20},
                {x: 0, y: 200, w: 150, h: 20} // Plataforma alta inicial
            ],
            coins: [
                {x: 300, y: 440}, {x: 450, y: 360}, {x: 600, y: 280}, {x: 750, y: 200}, {x: 50, y: 160}
            ],
            enemies: [
                {x: 420, y: 370, type: 'walker'},
                {x: 600, y: 520, type: 'walker'} // Inimigo no chão (se houvesse chão continuo)
            ]
        },
        { // Fase 3: Difícil
            platforms: [
                {x: 0, y: 550, w: 100, h: 50},
                {x: 150, y: 500, w: 60, h: 20},
                {x: 260, y: 450, w: 60, h: 20},
                {x: 370, y: 400, w: 60, h: 20},
                {x: 480, y: 350, w: 60, h: 20},
                {x: 590, y: 300, w: 60, h: 20},
                {x: 700, y: 250, w: 100, h: 20}
            ],
            coins: [
                {x: 170, y: 460}, {x: 280, y: 410}, {x: 390, y: 360}, 
                {x: 500, y: 310}, {x: 610, y: 260}, {x: 750, y: 210}
            ],
            enemies: [
                {x: 720, y: 220, type: 'walker'}
            ]
        }
    ];

    // Controles
    window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
            if (!keys.up && player.grounded) {
                player.vy = player.jumpStrength;
                player.grounded = false;
                createParticles(player.x + player.width/2, player.y + player.height, '#fff', 5);
            }
            keys.up = true;
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
    });

    function initLevel(lvlIndex) {
        if (lvlIndex > levels.length) {
            winGame();
            return;
        }
        
        currentLevel = lvlIndex;
        levelDisplay.innerText = currentLevel;
        
        const data = levels[lvlIndex - 1];
        
        // Resetar posições
        player.x = 50;
        player.y = 400;
        player.vx = 0;
        player.vy = 0;
        
        // Carregar entidades
        platforms = JSON.parse(JSON.stringify(data.platforms));
        coins = JSON.parse(JSON.stringify(data.coins)).map(c => ({...c, collected: false, w: 20, h: 20}));
        enemies = JSON.parse(JSON.stringify(data.enemies)).map(e => ({...e, w: 30, h: 20, vx: 2, startX: e.x}));
        
        gameState = 'LEVEL_TRANSITION';
        levelTitle.innerText = `Fase ${currentLevel}`;
        levelScreen.classList.remove('hidden');
        
        setTimeout(() => {
            levelScreen.classList.add('hidden');
            gameState = 'PLAYING';
        }, 2000);
    }

    function startGame() {
        score = 0;
        lives = 3;
        updateUI();
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        initLevel(1);
        loop();
    }

    function resetGame() {
        startGame();
    }

    function winGame() {
        gameState = 'GAMEOVER';
        goTitle.innerText = "VOCÊ É UMA LENDA!";
        goTitle.style.color = "#00ff00";
        finalScoreDisplay.innerText = score;
        gameOverScreen.classList.remove('hidden');
    }

    function gameOver() {
        gameState = 'GAMEOVER';
        goTitle.innerText = "FIM DE JOGO";
        goTitle.style.color = "#ff0000";
        finalScoreDisplay.innerText = score;
        gameOverScreen.classList.remove('hidden');
    }

    function updateUI() {
        scoreDisplay.innerText = score;
        livesDisplay.innerText = lives;
    }

    function createParticles(x, y, color, count) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 30,
                color: color
            });
        }
    }

    function drawOzzyCat(x, y, w, h, facingRight) {
        ctx.save();
        ctx.translate(x + w/2, y + h/2);
        if (!facingRight) ctx.scale(-1, 1);

        // 1. Corpo Redondo Preto com "Relevo de Pelo"
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(0, 0, w/2, 0, Math.PI * 2);
        ctx.fill();

        // Textura de pelo (traços irregulares ao redor)
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for(let i=0; i<12; i++) {
            let angle = (i / 12) * Math.PI * 2;
            let r1 = w/2;
            let r2 = w/2 + 3;
            ctx.moveTo(Math.cos(angle)*r1, Math.sin(angle)*r1);
            ctx.lineTo(Math.cos(angle)*r2, Math.sin(angle)*r2);
        }
        ctx.stroke();

        // 2. Orelhas Pontudas
        ctx.fillStyle = '#000';
        ctx.beginPath();
        // Orelha Esq
        ctx.moveTo(-15, -15);
        ctx.lineTo(-25, -35);
        ctx.lineTo(-5, -20);
        // Orelha Dir
        ctx.moveTo(15, -15);
        ctx.lineTo(25, -35);
        ctx.lineTo(5, -20);
        ctx.fill();
        
        // Interior rosa das orelhas
        ctx.fillStyle = '#ffb7c5';
        ctx.beginPath();
        ctx.moveTo(-15, -15);
        ctx.lineTo(-22, -30);
        ctx.lineTo(-8, -18);
        ctx.moveTo(15, -15);
        ctx.lineTo(22, -30);
        ctx.lineTo(8, -18);
        ctx.fill();

        // 3. Óculos do Ozzy (Redondos, Escuros)
        ctx.fillStyle = '#111'; // Lentes escuras
        ctx.strokeStyle = '#silver';
        ctx.lineWidth = 2;
        
        // Armação
        ctx.beginPath();
        ctx.arc(-8, -5, 10, 0, Math.PI*2); // Lente esq
        ctx.arc(12, -5, 10, 0, Math.PI*2); // Lente dir
        ctx.fill();
        ctx.stroke();
        
        // Ponte do nariz
        ctx.beginPath();
        ctx.moveTo(-2, -5);
        ctx.lineTo(2, -5);
        ctx.stroke();

        // Olhos VERDES brilhantes atrás dos óculos
        ctx.fillStyle = '#00ff00';
        ctx.shadowColor = '#00ff00';
        ctx.shadowBlur = 5;
        ctx.beginPath();
        ctx.arc(-8, -5, 4, 0, Math.PI*2);
        ctx.arc(12, -5, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Brilho nos olhos/lentes
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-6, -7, 1.5, 0, Math.PI*2);
        ctx.arc(14, -7, 1.5, 0, Math.PI*2);
        ctx.fill();

        // 4. Nariz e Bigodes
        ctx.fillStyle = '#ffb7c5'; // Nariz rosa
        ctx.beginPath();
        ctx.arc(0, 5, 3, 0, Math.PI*2);
        ctx.fill();

        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        // Bigodes
        ctx.beginPath();
        ctx.moveTo(5, 8); ctx.lineTo(20, 5);
        ctx.moveTo(5, 10); ctx.lineTo(20, 10);
        ctx.moveTo(-5, 8); ctx.lineTo(-20, 5);
        ctx.moveTo(-5, 10); ctx.lineTo(-20, 10);
        ctx.stroke();

        // 5. Patinhas (Animadas)
        const walkOffset = Math.sin(frames * 0.2) * 5;
        ctx.fillStyle = '#000';
        
        // Patinha traseira
        ctx.beginPath();
        ctx.ellipse(-10, 15, 6, 4, 0, 0, Math.PI*2);
        ctx.fill();
        
        // Patinha dianteira (movimenta mais)
        ctx.beginPath();
        let frontPawY = player.grounded ? 15 + (keys.right || keys.left ? walkOffset : 0) : 10;
        ctx.ellipse(10, frontPawY, 6, 4, 0, 0, Math.PI*2);
        ctx.fill();

        // Almofadinhas rosas nas patas
        ctx.fillStyle = '#ffb7c5';
        ctx.beginPath();
        ctx.arc(-10, 15, 2, 0, Math.PI*2);
        ctx.arc(10, frontPawY, 2, 0, Math.PI*2);
        ctx.fill();

        // 6. Cauda
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-15, 10);
        ctx.quadraticCurveTo(-25, 0, -20, -10 + walkOffset);
        ctx.stroke();

        ctx.restore();
    }

    function update() {
        if (gameState !== 'PLAYING') return;

        frames++;

        // Movimento Horizontal
        if (keys.right) {
            player.vx = player.speed;
            player.facingRight = true;
        } else if (keys.left) {
            player.vx = -player.speed;
            player.facingRight = false;
        } else {
            player.vx *= 0.8; // Fricção
        }

        player.x += player.vx;

        // Limites da tela
        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

        // Gravidade e Pulo
        player.vy += player.gravity;
        player.y += player.vy;

        // Colisão com Plataformas
        player.grounded = false;
        for (let plat of platforms) {
            // Detecção simples AABB
            if (player.x < plat.x + plat.w &&
                player.x + player.width > plat.x &&
                player.y < plat.y + plat.h &&
                player.y + player.height > plat.y) {
                
                // Colisão vindo de cima (pousando)
                if (player.vy > 0 && player.y + player.height - player.vy <= plat.y + 10) {
                    player.y = plat.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                }
                // Colisão vindo de baixo (batendo a cabeça)
                else if (player.vy < 0 && player.y - player.vy >= plat.y + plat.h - 10) {
                    player.y = plat.y + plat.h;
                    player.vy = 0;
                }
                // Colisão lateral (simplificada)
                else if (player.vx > 0) {
                    player.x = plat.x - player.width;
                } else if (player.vx < 0) {
                    player.x = plat.x + plat.w;
                }
            }
        }

        // Morte por queda
        if (player.y > canvas.height) {
            handleDeath();
        }

        // Coletar Moedas (Morcegos)
        coins.forEach(coin => {
            if (!coin.collected &&
                player.x < coin.x + coin.w &&
                player.x + player.width > coin.x &&
                player.y < coin.y + coin.h &&
                player.y + player.height > coin.y) {
                
                coin.collected = true;
                score += 10;
                createParticles(coin.x + coin.w/2, coin.y + coin.h/2, '#ffd700', 10);
                updateUI();
            }
        });

        // Inimigos
        enemies.forEach(enemy => {
            // Movimento simples
            enemy.x += enemy.vx;
            if (enemy.x > enemy.startX + 50 || enemy.x < enemy.startX - 50) {
                enemy.vx *= -1;
            }

            // Colisão
            if (player.x < enemy.x + enemy.w &&
                player.x + player.width > enemy.x &&
                player.y < enemy.y + enemy.h &&
                player.y + player.height > enemy.y) {
                
                // Se cair em cima do inimigo, mata o inimigo
                if (player.vy > 0 && player.y + player.height - player.vy <= enemy.y + enemy.h/2) {
                    enemy.dead = true;
                    player.vy = -8; // Pulo rebote
                    score += 20;
                    createParticles(enemy.x + enemy.w/2, enemy.y + enemy.h/2, '#ff0000', 15);
                    updateUI();
                } else {
                    handleDeath();
                }
            }
        });
        
        // Remover inimigos mortos
        enemies = enemies.filter(e => !e.dead);

        // Partículas
        particles.forEach((p, index) => {
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            if(p.life <= 0) particles.splice(index, 1);
        });

        // Checar fim da fase (chegar ao lado direito)
        if (player.x >= canvas.width - 50) {
            initLevel(currentLevel + 1);
        }
    }

    function handleDeath() {
        lives--;
        updateUI();
        createParticles(player.x + player.width/2, player.y + player.height/2, '#ff0000', 20);
        
        if (lives <= 0) {
            gameOver();
        } else {
            // Respawn na posição inicial da fase
            player.x = 50;
            player.y = 300;
            player.vy = 0;
        }
    }

    function draw() {
        // Limpar tela
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Desenhar Cenário (Plataformas)
        ctx.fillStyle = '#2a2a2a'; // Cor de pedra/escura
        platforms.forEach(plat => {
            ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
            // Detalhe verde/musgo no topo
            ctx.fillStyle = '#4a6b3a';
            ctx.fillRect(plat.x, plat.y, plat.w, 5);
            ctx.fillStyle = '#2a2a2a';
        });

        // Desenhar Moedas (Morcegos)
        coins.forEach(coin => {
            if (!coin.collected) {
                ctx.fillStyle = '#ffd700';
                // Desenho simples de morcego/moeda
                ctx.beginPath();
                let floatY = Math.sin(frames * 0.1) * 5;
                ctx.arc(coin.x + coin.w/2, coin.y + coin.h/2 + floatY, 10, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.font = '12px Arial';
                ctx.fillText('🦇', coin.x + 2, coin.y + 14 + floatY);
            }
        });

        // Desenhar Inimigos (Aranhas)
        enemies.forEach(enemy => {
            ctx.fillStyle = '#800000';
            ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
            // Olhos vermelhos
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(enemy.x + 5, enemy.y + 5, 5, 5);
            ctx.fillRect(enemy.x + 20, enemy.y + 5, 5, 5);
        });

        // Desenhar Jogador (Ozzy Cat)
        drawOzzyCat(player.x, player.y, player.width, player.height, player.facingRight);

        // Desenhar Partículas
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 4, 4);
        });
    }

    function loop() {
        if (gameState === 'PLAYING' || gameState === 'LEVEL_TRANSITION') {
            update();
            draw();
            requestAnimationFrame(loop);
        }
    }

    // Desenho inicial
    draw();

</script>
</body>
</html>
